name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: woshmart
          POSTGRES_PASSWORD: woshmart
          POSTGRES_DB: woshmart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U woshmart"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://woshmart:woshmart@localhost:5432/woshmart_test
      REDIS_URL: redis://localhost:6379
      # CI-only fixture values — not real credentials, never used to call any Twilio
      # or JWT-verifying service. Signature tests compute and verify against this same
      # token, which is all the crypto needs to prove the middleware logic is correct.
      TWILIO_ACCOUNT_SID: ACci00000000000000000000000000000
      TWILIO_AUTH_TOKEN: ci_test_auth_token_not_real
      TWILIO_WHATSAPP_NUMBER: whatsapp:+15005550006
      JWT_SIGNING_SECRET: ci_only_jwt_signing_secret_not_real_00000000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
